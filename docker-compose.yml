services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-parking}"
      POSTGRES_USER: "${POSTGRES_USER:-parking}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env for PostgreSQL}"
      TZ: "${APP_TIME_ZONE:-Europe/Moscow}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-parking}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env for PostgreSQL}@postgres:5432/${POSTGRES_DB:-parking}"
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env. Generate it with openssl rand -hex 32}"
      APP_TIME_ZONE: "${APP_TIME_ZONE:-Europe/Moscow}"
      ACCESS_TOKEN_EXPIRE_HOURS: "${ACCESS_TOKEN_EXPIRE_HOURS:-12}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}"
      INITIAL_ADMIN_USERNAMES: "${INITIAL_ADMIN_USERNAMES:?Set INITIAL_ADMIN_USERNAMES in .env for first LDAP admins}"
      LDAP_URL: "${LDAP_URL:-}"
      LDAP_BIND_DN: "${LDAP_BIND_DN:-}"
      LDAP_BIND_PASSWORD: "${LDAP_BIND_PASSWORD:-}"
      LDAP_USER_SEARCH_BASE: "${LDAP_USER_SEARCH_BASE:-}"
      LDAP_USER_FILTER: "${LDAP_USER_FILTER:-(sAMAccountName={username})}"
      LDAP_USER_FULL_NAME_ATTRIBUTE: "${LDAP_USER_FULL_NAME_ATTRIBUTE:-displayName}"
      LDAP_TLS_VALIDATE: "${LDAP_TLS_VALIDATE:-true}"
      LDAP_CA_CERT_FILE: "${LDAP_CA_CERT_FILE:-}"
      LDAP_CONNECT_TIMEOUT: "${LDAP_CONNECT_TIMEOUT:-5}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_TIME_ZONE: "${APP_TIME_ZONE:-Europe/Moscow}"
    ports:
      - "${FRONTEND_BIND_IP:-0.0.0.0}:${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:

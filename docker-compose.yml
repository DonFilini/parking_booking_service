services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:////data/parking.db
      SECRET_KEY: change-this-local-secret
      APP_TIME_ZONE: Europe/Moscow
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - parking_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  parking_data:

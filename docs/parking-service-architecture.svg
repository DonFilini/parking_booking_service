<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #202830; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #5a6673; }
      .group-title { font: 700 22px Arial, sans-serif; fill: #202830; }
      .box-title { font: 700 20px Arial, sans-serif; fill: #202830; }
      .box-text { font: 400 16px Arial, sans-serif; fill: #4c5864; }
      .label { font: 700 15px Arial, sans-serif; fill: #202830; }
      .small { font: 400 14px Arial, sans-serif; fill: #5a6673; }
      .port { font: 700 15px Consolas, monospace; fill: #ffffff; }
      .box { fill: #ffffff; stroke: #aeb7bf; stroke-width: 2; }
      .soft { fill: #f5f6f6; stroke: #aeb7bf; stroke-width: 2; }
      .orange { fill: #fff0e8; stroke: #ff6a1a; stroke-width: 3; }
      .network { fill: #f8f9f9; stroke: #77828d; stroke-width: 2; stroke-dasharray: 9 7; }
      .arrow { fill: none; stroke: #ff6a1a; stroke-width: 4; marker-end: url(#arrow-orange); }
      .internal { fill: none; stroke: #5a6673; stroke-width: 3; marker-end: url(#arrow-gray); }
      .dashed { fill: none; stroke: #77828d; stroke-width: 2; stroke-dasharray: 8 6; marker-end: url(#arrow-gray); }
    </style>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff6a1a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5a6673"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#202830" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <text x="70" y="70" class="title">Сервис бронирования парковочных мест</text>
  <text x="70" y="104" class="subtitle">Схема сетевого взаимодействия и контейнеров Docker</text>

  <!-- Users -->
  <rect x="70" y="250" width="250" height="170" rx="8" class="soft" filter="url(#shadow)"/>
  <text x="195" y="295" text-anchor="middle" class="box-title">Пользователи</text>
  <text x="195" y="330" text-anchor="middle" class="box-text">Браузер на рабочем ПК</text>
  <text x="195" y="360" text-anchor="middle" class="box-text">Сотрудник / менеджер</text>
  <text x="195" y="390" text-anchor="middle" class="box-text">/ администратор</text>

  <!-- Docker host boundary -->
  <rect x="430" y="155" width="1080" height="625" rx="8" class="network"/>
  <text x="465" y="195" class="group-title">Linux-сервер с Docker</text>
  <text x="465" y="223" class="small">Compose-проект: parking_booking</text>

  <!-- Published port -->
  <rect x="455" y="270" width="215" height="120" rx="8" class="orange" filter="url(#shadow)"/>
  <text x="562" y="307" text-anchor="middle" class="box-title">Внешний адрес</text>
  <text x="562" y="340" text-anchor="middle" class="box-text">IP_СЕРВЕРА</text>
  <rect x="500" y="354" width="125" height="29" rx="6" fill="#ff6a1a"/>
  <text x="562" y="375" text-anchor="middle" class="port">FRONTEND_PORT</text>

  <!-- Docker network -->
  <rect x="720" y="240" width="750" height="480" rx="8" fill="#ffffff" stroke="#d9dddf" stroke-width="2"/>
  <text x="750" y="275" class="group-title">Внутренняя сеть Docker</text>
  <text x="750" y="300" class="small">Недоступна напрямую пользователям и другим проектам</text>

  <!-- Frontend -->
  <rect x="770" y="340" width="270" height="190" rx="8" class="orange" filter="url(#shadow)"/>
  <text x="905" y="382" text-anchor="middle" class="box-title">Frontend</text>
  <text x="905" y="414" text-anchor="middle" class="box-text">Nginx :80</text>
  <text x="905" y="446" text-anchor="middle" class="box-text">React SPA</text>
  <text x="905" y="478" text-anchor="middle" class="box-text">Статика: HTML / JS / CSS</text>
  <text x="905" y="508" text-anchor="middle" class="box-text">Прокси: /api/*</text>

  <!-- Backend -->
  <rect x="1130" y="340" width="270" height="190" rx="8" class="box" filter="url(#shadow)"/>
  <text x="1265" y="382" text-anchor="middle" class="box-title">Backend</text>
  <text x="1265" y="414" text-anchor="middle" class="box-text">FastAPI + Uvicorn</text>
  <text x="1265" y="446" text-anchor="middle" class="box-text">backend:8000</text>
  <text x="1265" y="478" text-anchor="middle" class="box-text">REST API / JSON</text>
  <text x="1265" y="508" text-anchor="middle" class="box-text">JWT Bearer</text>

  <!-- Database -->
  <path d="M1160 610 C1160 590 1370 590 1370 610 L1370 675 C1370 695 1160 695 1160 675 Z" fill="#f5f6f6" stroke="#77828d" stroke-width="2"/>
  <ellipse cx="1265" cy="610" rx="105" ry="20" fill="#ffffff" stroke="#77828d" stroke-width="2"/>
  <text x="1265" y="642" text-anchor="middle" class="box-title">SQLite</text>
  <text x="1265" y="668" text-anchor="middle" class="small">/data/parking.db</text>
  <text x="1265" y="690" text-anchor="middle" class="small">volume: parking_data</text>

  <!-- Main request arrows -->
  <path d="M320 320 L455 320" class="arrow"/>
  <text x="388" y="302" text-anchor="middle" class="label">HTTP</text>
  <text x="388" y="344" text-anchor="middle" class="small">IP:порт</text>

  <path d="M670 330 L770 410" class="arrow"/>
  <text x="714" y="350" text-anchor="middle" class="small">порт хоста</text>
  <text x="714" y="370" text-anchor="middle" class="small">→ порт 80</text>

  <path d="M1040 435 L1130 435" class="internal"/>
  <text x="1085" y="410" text-anchor="middle" class="label">HTTP</text>
  <text x="1085" y="460" text-anchor="middle" class="small">/api → :8000</text>

  <path d="M1265 530 L1265 590" class="internal"/>
  <text x="1282" y="566" class="small">SQLAlchemy</text>

  <!-- Other services / port note -->
  <rect x="70" y="590" width="520" height="165" rx="8" class="box"/>
  <text x="95" y="628" class="box-title">Другие проекты на сервере</text>
  <text x="95" y="660" class="box-text">Например, Portainer публикует 0.0.0.0:8000</text>
  <text x="95" y="692" class="box-text">Конфликта нет: backend:8000 не опубликован на хосте.</text>
  <text x="95" y="724" class="box-text">Уникальным должен быть только FRONTEND_PORT.</text>
  <path d="M590 665 C650 665 650 630 720 630" class="dashed"/>

  <!-- Legend -->
  <rect x="70" y="815" width="1440" height="50" rx="8" fill="#f8f9f9" stroke="#d9dddf"/>
  <line x1="100" y1="840" x2="160" y2="840" class="arrow"/>
  <text x="180" y="846" class="small">запрос пользователя</text>
  <line x1="380" y1="840" x2="440" y2="840" class="internal"/>
  <text x="460" y="846" class="small">взаимодействие внутри Docker</text>
  <text x="820" y="846" class="small">Настройки внешнего адреса: .env → FRONTEND_BIND_IP, FRONTEND_PORT, CORS_ORIGINS</text>
</svg>
